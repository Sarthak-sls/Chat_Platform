<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Chat Platform</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-dark-base: #1e1e2e;
        --color-dark-crust: #11111b;
        --color-dark-mantle: #181825;
      }
    </style>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body class="bg-[#1e1e2e]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const socket = io('http://localhost:5000');

        const ChatApp = () => {
          const [activeChannel, setActiveChannel] = useState('general');
          const [inputText, setInputText] = useState('');
          const [isPrivate, setIsPrivate] = useState(false);

          // AI Assistant State
          const [aiMessages, setAiMessages] = useState([
            { id: 1, author: 'Gemini AI', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), text: 'Hello! I am your AI assistant powered by Gemini. How can I help you with your college work today?' }
          ]);
          const [isAiTyping, setIsAiTyping] = useState(false);
          const GEMINI_API_KEY = 'YOUR_API_KEY_HERE'; // REPLACE WITH YOUR ACTUAL API KEY (Do not push to GitHub)

          const [messages, setMessages] = useState({
            'general': [
              { id: 1, author: 'Project Mentor', time: '10:00 AM', text: 'Let me know when the UI prototype for the 8th-semester submission is ready to view.' },
              { id: 2, author: 'Sarthak (Admin)', time: '10:05 AM', text: 'Just finishing up the channel navigation and message state now.' }
            ],
            'project-updates': [
              { id: 3, author: 'Sarthak (Admin)', time: 'Yesterday', text: 'Got the single-file React prototype working.' }
            ],
            'faculty-announcements': [
              { id: 5, author: 'HOD', time: 'Monday', text: 'Reminder: All final project abstracts must be finalized this week.' }
            ]
          });

          const channels = ['general', 'project-updates', 'faculty-announcements'];

          // Join channel when active channel changes
          useEffect(() => {
            socket.emit('join_channel', activeChannel);
          }, [activeChannel]);

          // Listen for incoming messages
          useEffect(() => {
            const handleReceiveMessage = (data) => {
              setMessages((prevMessages) => {
                const channelMsgs = prevMessages[data.channelName] || [];
                return {
                  ...prevMessages,
                  [data.channelName]: [...channelMsgs, data]
                };
              });
            };

            socket.on('receive_message', handleReceiveMessage);
            return () => socket.off('receive_message', handleReceiveMessage);
          }, []);

          const handleSendMessage = (e) => {
            e.preventDefault();
            if (!inputText.trim()) return;

            const newMessage = {
              id: Date.now(),
              author: 'Sarthak (Admin)',
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              text: inputText,
              channelName: activeChannel
            };

            // Send message to the server
            socket.emit('send_message', newMessage);

            // Optimistically update our own screen
            setMessages((prev) => ({
              ...prev,
              [activeChannel]: [...(prev[activeChannel] || []), newMessage]
            }));
            setInputText('');
          };

          const handleSendAiMessage = async (e) => {
            e.preventDefault();
            if (!inputText.trim()) return;

            const userText = inputText;
            const newUserMsg = { id: Date.now(), author: 'Sarthak (Admin)', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), text: userText };
            
            setAiMessages(prev => [...prev, newUserMsg]);
            setInputText('');
            setIsAiTyping(true);

            try {
              if (GEMINI_API_KEY === 'YOUR_API_KEY_HERE') {
                throw new Error("API Key is missing! Please paste your Gemini API key in the GEMINI_API_KEY variable in the code.");
              }

              // Simple API call to Gemini 2.5 Flash
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: userText }] }]
                })
              });

              const data = await response.json();
              if (data.error) throw new Error(data.error.message);
              
              const aiText = data.candidates[0].content.parts[0].text;
              
              setAiMessages(prev => [...prev, { id: Date.now() + 1, author: 'Gemini AI', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), text: aiText }]);
            } catch (error) {
              setAiMessages(prev => [...prev, { id: Date.now() + 1, author: 'System Error', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), text: `Error: ${error.message}` }]);
            } finally {
              setIsAiTyping(false);
            }
          };

          return (
            <div className="flex h-screen bg-[#1e1e2e] text-[#cdd6f4] font-sans selection:bg-[#cba6f7] selection:text-[#11111b]">
              
              {/* Sidebar Navigation */}
              <div className="w-64 bg-[#181825] flex flex-col border-r border-[#313244]">
                <div className="h-16 flex items-center px-4 font-bold text-xl shadow-sm bg-[#11111b] text-[#cba6f7]">
                  Nullclaw Node
                </div>
                
                <div className="flex-1 overflow-y-auto py-4 px-2 space-y-1">
                  <div className="px-2 mb-2 text-xs font-semibold text-[#a6adc8] uppercase tracking-wider">Text Channels</div>
                  {channels.map((channel) => (
                    <div
                      key={channel}
                      onClick={() => setActiveChannel(channel)}
                      className={`px-3 py-2 rounded-md cursor-pointer flex items-center transition-colors duration-200 ${
                        activeChannel === channel ? 'bg-[#313244] text-[#cdd6f4]' : 'text-[#a6adc8] hover:bg-[#313244] hover:text-[#cdd6f4]'
                      }`}
                    >
                      <span className="text-xl mr-2 text-[#6c7086]">#</span>
                      {channel}
                    </div>
                  ))}
                  
                  <div className="px-2 mb-2 mt-6 text-xs font-semibold text-[#a6adc8] uppercase tracking-wider">Resources</div>
                  <div
                    onClick={() => setActiveChannel('library')}
                    className={`px-3 py-2 rounded-md cursor-pointer flex items-center transition-colors duration-200 ${
                      activeChannel === 'library' ? 'bg-[#313244] text-[#cdd6f4]' : 'text-[#a6adc8] hover:bg-[#313244] hover:text-[#cdd6f4]'
                    }`}
                  >
                    <svg className="w-5 h-5 mr-2 text-[#6c7086]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    Library & Notes
                  </div>
                  
                  <div className="px-2 mb-2 mt-6 text-xs font-semibold text-[#a6adc8] uppercase tracking-wider">AI Assistant</div>
                  <div
                    onClick={() => setActiveChannel('ai-assistant')}
                    className={`px-3 py-2 rounded-md cursor-pointer flex items-center transition-colors duration-200 ${
                      activeChannel === 'ai-assistant' ? 'bg-[#313244] text-[#cdd6f4]' : 'text-[#a6adc8] hover:bg-[#313244] hover:text-[#cdd6f4]'
                    }`}
                  >
                    <svg className="w-5 h-5 mr-2 text-[#6c7086]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    Gemini AI
                  </div>
                </div>
                
                <div className="h-16 bg-[#11111b] p-3 flex items-center border-t border-[#313244]">
                  <div className="w-8 h-8 rounded-full bg-[#89b4fa] flex items-center justify-center font-bold text-[#11111b] mr-3">S</div>
                  <div className="flex flex-col">
                    <span className="text-sm font-bold">Sarthak</span>
                    <span className="text-xs text-[#a6adc8]">Admin</span>
                  </div>
                </div>
              </div>

              {/* Main Chat Area */}
              <div className="flex-1 flex flex-col min-w-0 bg-[#1e1e2e]">
                
                <div className="h-16 flex items-center px-6 border-b border-[#313244] bg-[#1e1e2e] shadow-sm">
                  <span className="text-2xl text-[#6c7086] mr-2">#</span>
                  <h2 className="font-bold text-lg">{activeChannel}</h2>
                  
                  {/* Privacy Toggle Demo */}
                  <button 
                    onClick={() => setIsPrivate(!isPrivate)}
                    className={`ml-auto px-3 py-1 rounded text-xs font-bold transition-all ${
                      isPrivate ? 'bg-green-600 text-white' : 'bg-gray-600 text-gray-300'
                    }`}
                  >
                    {isPrivate ? 'E2EE ENABLED' : 'STANDARD MODE'}
                  </button>
                </div>

                {activeChannel === 'library' ? (
                  <div className="flex-1 overflow-y-auto p-8 bg-[#1e1e2e]">
                    <div className="max-w-3xl mx-auto bg-[#181825] rounded-xl p-8 shadow-sm border border-[#313244]">
                      <h2 className="text-2xl font-bold text-[#cba6f7] mb-2">Library & Resources</h2>
                      <p className="text-[#a6adc8] mb-8">Apply for books or upload your own notes to share with the college community.</p>
                      
                      <div className="space-y-6">
                        <div>
                          <label className="block text-sm font-medium text-[#cdd6f4] mb-2">Request a Book / Note</label>
                          <input type="text" placeholder="Title of the book or topic..." className="w-full bg-[#313244] text-[#cdd6f4] rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#89b4fa] placeholder-[#6c7086] transition-all" />
                        </div>
                        
                        <div>
                          <label className="block text-sm font-medium text-[#cdd6f4] mb-2">Additional Details</label>
                          <textarea rows="3" placeholder="Author name, specific edition, or why you need it..." className="w-full bg-[#313244] text-[#cdd6f4] rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#89b4fa] placeholder-[#6c7086] transition-all resize-none"></textarea>
                        </div>
                        
                        <div className="border-t border-[#313244] pt-6 mt-2">
                          <label className="block text-sm font-medium text-[#cdd6f4] mb-2">Upload Notes from Device</label>
                          <div className="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-[#313244] border-dashed rounded-lg hover:border-[#89b4fa] transition-colors cursor-pointer group">
                            <div className="space-y-1 text-center">
                              <svg className="mx-auto h-12 w-12 text-[#6c7086] group-hover:text-[#89b4fa] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                              </svg>
                              <div className="flex text-sm justify-center text-[#a6adc8] mt-2">
                                <label htmlFor="file-upload" className="relative cursor-pointer rounded-md font-medium text-[#89b4fa] hover:text-[#74a5f9] focus-within:outline-none">
                                  <span>Upload a file</span>
                                  <input id="file-upload" name="file-upload" type="file" className="sr-only" />
                                </label>
                                <p className="pl-1">or drag and drop</p>
                              </div>
                              <p className="text-xs text-[#6c7086] mt-2">PDF, DOCX, or Images up to 10MB</p>
                            </div>
                          </div>
                        </div>

                        <div className="pt-4 flex justify-end">
                          <button className="px-6 py-2 bg-[#cba6f7] hover:bg-[#b48ead] text-[#11111b] rounded-lg font-bold transition-colors shadow-sm">
                            Submit Application
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : activeChannel === 'ai-assistant' ? (
                  <>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                      {aiMessages.map((msg) => (
                        <div key={msg.id} className="flex group">
                          <div className={`w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center mr-4 mt-1 font-bold ${msg.author === 'Gemini AI' ? 'bg-[#cba6f7] text-[#11111b]' : msg.author === 'System Error' ? 'bg-red-500 text-white' : 'bg-[#313244] text-[#a6adc8]'}`}>
                            {msg.author.charAt(0)}
                          </div>
                          <div>
                            <div className="flex items-baseline space-x-2">
                              <span className={`font-semibold ${msg.author.includes('Sarthak') ? 'text-[#89b4fa]' : msg.author === 'System Error' ? 'text-red-400' : 'text-[#cba6f7]'}`}>{msg.author}</span>
                              <span className="text-xs text-[#6c7086]">{msg.time}</span>
                            </div>
                            <p className="text-[#cdd6f4] mt-1 leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                          </div>
                        </div>
                      ))}
                      {isAiTyping && (
                        <div className="flex group">
                          <div className="w-10 h-10 rounded-full bg-[#cba6f7] text-[#11111b] flex-shrink-0 flex items-center justify-center mr-4 mt-1 font-bold">
                            G
                          </div>
                          <div>
                            <div className="flex items-baseline space-x-2">
                              <span className="font-semibold text-[#cba6f7]">Gemini AI</span>
                            </div>
                            <p className="text-[#cdd6f4] mt-1 leading-relaxed flex space-x-1 items-center h-6">
                              <span className="w-2 h-2 bg-[#a6adc8] rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                              <span className="w-2 h-2 bg-[#a6adc8] rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                              <span className="w-2 h-2 bg-[#a6adc8] rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                            </p>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="p-4 px-6 mb-2">
                      <form onSubmit={handleSendAiMessage} className="relative">
                        <input
                          type="text"
                          value={inputText}
                          onChange={(e) => setInputText(e.target.value)}
                          placeholder="Ask Gemini anything..."
                          className="w-full bg-[#313244] text-[#cdd6f4] rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-[#89b4fa] placeholder-[#6c7086] transition-all disabled:opacity-50"
                          disabled={isAiTyping}
                        />
                        <button type="submit" disabled={isAiTyping} className="absolute right-2 top-1.5 bottom-1.5 px-3 bg-[#89b4fa] hover:bg-[#74a5f9] text-[#11111b] rounded-md font-semibold transition-colors disabled:opacity-50">
                          {isAiTyping ? '...' : 'Send'}
                        </button>
                      </form>
                    </div>
                  </>
                ) : (
                  <>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                      {messages[activeChannel]?.map((msg) => (
                        <div key={msg.id} className="flex group">
                          <div className="w-10 h-10 rounded-full bg-[#313244] flex-shrink-0 flex items-center justify-center mr-4 mt-1 font-bold text-[#a6adc8]">
                            {msg.author.charAt(0)}
                          </div>
                          <div>
                            <div className="flex items-baseline space-x-2">
                              <span className={`font-semibold ${msg.author.includes('Sarthak') ? 'text-[#89b4fa]' : 'text-[#cba6f7]'}`}>{msg.author}</span>
                              <span className="text-xs text-[#6c7086]">{msg.time}</span>
                            </div>
                            <p className="text-[#cdd6f4] mt-1 leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="p-4 px-6 mb-2">
                      <form onSubmit={handleSendMessage} className="relative">
                        <input
                          type="text"
                          value={inputText}
                          onChange={(e) => setInputText(e.target.value)}
                          placeholder={`Message #${activeChannel}`}
                          className="w-full bg-[#313244] text-[#cdd6f4] rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-[#89b4fa] placeholder-[#6c7086] transition-all"
                        />
                        <button type="submit" className="absolute right-2 top-1.5 bottom-1.5 px-3 bg-[#89b4fa] hover:bg-[#74a5f9] text-[#11111b] rounded-md font-semibold transition-colors">
                          Send
                        </button>
                      </form>
                    </div>
                  </>
                )}
                
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChatApp />);
    </script>
</body>
</html>
